<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinBot — Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0d0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #141a1f;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo h1 {
      font-size: 2rem;
      color: #e8e4dc;
    }
    .logo h1 span { color: #c9a84c; }
    .logo p { color: #6b7280; font-size: 0.85rem; margin-top: 4px; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; color: #9ca3af; font-size: 0.8rem; margin-bottom: 6px; letter-spacing: 0.05em; }
    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #e8e4dc;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #c9a84c; }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #c9a84c, #e8c97a);
      color: #0a0d0f;
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .success {
      background: rgba(46,204,138,0.1);
      border: 1px solid rgba(46,204,138,0.3);
      color: #2ecc8a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .forgot { text-align: center; margin-top: 1rem; }
    .forgot a { color: #c9a84c; font-size: 0.85rem; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>Fin<span>Bot</span></h1>
      <p>AI Financial Planner via WhatsApp</p>
    </div>
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
    <div class="form-group">
      <label>EMAIL</label>
      <input type="email" id="email" placeholder="email@kamu.com">
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Masuk ke Dashboard</button>
    <div class="forgot">
      <a href="#" onclick="resetPassword()">Lupa password?</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://tpptxnedrutcvxzdfdss.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwcHR4bmVkcnV0Y3Z4emRmZHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODg2OTAsImV4cCI6MjA5MDk2NDY5MH0.-4wNK2BMvWluXTV8dE4hEtlh3jNQY2OhT2V9IBiiNds';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Cek kalau sudah login, langsung redirect
    async function checkSession() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = '/dashboard.html';
    }
    checkSession();

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!email || !password) {
        errorMsg.textContent = 'Email dan password harus diisi.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Masuk...';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = 'Email atau password salah. Coba lagi.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Masuk ke Dashboard';
        return;
      }

      successMsg.textContent = 'Login berhasil! Mengarahkan ke dashboard...';
      successMsg.style.display = 'block';
      setTimeout(() => window.location.href = '/dashboard.html', 1000);
    }

    async function resetPassword() {
      const email = document.getElementById('email').value.trim();
      if (!email) {
        alert('Masukkan email kamu dulu.');
        return;
      }
      await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/dashboard.html'
      });
      alert('Link reset password sudah dikirim ke email kamu!');
    }

    // Enter key
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
