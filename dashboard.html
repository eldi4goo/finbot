<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinBot — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0d0f; color: #e8e4dc; }
    .topbar {
      background: #141a1f;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 1.3rem; font-weight: 600; }
    .logo span { color: #c9a84c; }
    .user-info { display: flex; align-items: center; gap: 1rem; }
    .user-email { font-size: 0.8rem; color: #6b7280; }
    .btn-logout {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #ef4444;
      border-radius: 6px;
      padding: 0.4rem 0.85rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: #141a1f;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 1.25rem;
    }
    .stat-label { font-size: 0.7rem; color: #6b7280; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    .stat-value { font-size: 1.6rem; font-weight: 600; }
    .green { color: #2ecc8a; }
    .red { color: #ef4444; }
    .gold { color: #c9a84c; }
    .panel {
      background: #141a1f;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .panel-title { font-size: 1rem; font-weight: 600; }
    .btn-add {
      background: linear-gradient(135deg, #c9a84c, #e8c97a);
      color: #0a0d0f;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #141a1f;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 440px;
    }
    .modal h3 { margin-bottom: 1.25rem; color: #c9a84c; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; color: #9ca3af; font-size: 0.78rem; margin-bottom: 5px; }
    .form-group input, .form-group select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      color: #e8e4dc;
      font-size: 0.9rem;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: #c9a84c; }
    .form-group select option { background: #141a1f; }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .btn-save {
      flex: 1;
      background: linear-gradient(135deg, #c9a84c, #e8c97a);
      color: #0a0d0f;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-cancel {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #9ca3af;
      border-radius: 8px;
      padding: 0.75rem;
      cursor: pointer;
    }
    /* Tabel */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 0.72rem; color: #6b7280; letter-spacing: 0.08em; padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
    td { padding: 0.85rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.88rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
    }
    .badge-income { background: rgba(46,204,138,0.15); color: #2ecc8a; }
    .badge-expense { background: rgba(239,68,68,0.15); color: #ef4444; }
    .action-btns { display: flex; gap: 0.5rem; }
    .btn-edit {
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.2);
      color: #c9a84c;
      border-radius: 6px;
      padding: 0.3rem 0.65rem;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .btn-delete {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #ef4444;
      border-radius: 6px;
      padding: 0.3rem 0.65rem;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .empty { text-align: center; color: #6b7280; padding: 2rem; font-size: 0.9rem; }
    .loading { text-align: center; color: #6b7280; padding: 1rem; }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="logo">Fin<span>Bot</span></div>
  <div class="user-info">
    <span class="user-email" id="userEmail">Loading...</span>
    <button class="btn-logout" onclick="logout()">Keluar</button>
  </div>
</div>

<!-- Modal Tambah/Edit Transaksi -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Tambah Transaksi</h3>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>JENIS</label>
      <select id="txType">
        <option value="expense">Pengeluaran</option>
        <option value="income">Pemasukan</option>
      </select>
    </div>
    <div class="form-group">
      <label>NOMINAL (Rp)</label>
      <input type="number" id="txAmount" placeholder="50000">
    </div>
    <div class="form-group">
      <label>KATEGORI</label>
      <select id="txCategory">
        <option value="Makanan">🍜 Makanan</option>
        <option value="Transportasi">🚗 Transportasi</option>
        <option value="Belanja">🛒 Belanja</option>
        <option value="Hiburan">🎮 Hiburan</option>
        <option value="Kesehatan">💊 Kesehatan</option>
        <option value="Tagihan">📱 Tagihan</option>
        <option value="Gaji">💰 Gaji</option>
        <option value="Freelance">💻 Freelance</option>
        <option value="Lainnya">📦 Lainnya</option>
      </select>
    </div>
    <div class="form-group">
      <label>KETERANGAN</label>
      <input type="text" id="txDesc" placeholder="Makan siang di warteg">
    </div>
    <div class="form-group">
      <label>TANGGAL</label>
      <input type="date" id="txDate">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-save" onclick="saveTransaction()">Simpan</button>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="container">
  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">SALDO BERSIH</div>
      <div class="stat-value gold" id="statSaldo">Rp 0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">PEMASUKAN BULAN INI</div>
      <div class="stat-value green" id="statIncome">Rp 0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">PENGELUARAN BULAN INI</div>
      <div class="stat-value red" id="statExpense">Rp 0</div>
    </div>
  </div>

  <!-- Transaksi -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">📋 Riwayat Transaksi</div>
      <button class="btn-add" onclick="openModal()">+ Tambah Transaksi</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>TANGGAL</th>
          <th>KETERANGAN</th>
          <th>KATEGORI</th>
          <th>JENIS</th>
          <th>NOMINAL</th>
          <th>AKSI</th>
        </tr>
      </thead>
      <tbody id="txTable">
        <tr><td colspan="6" class="loading">Memuat data...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://tpptxnedrutcvxzdfdss.supabase.co';
  const SUPABASE_ANON_KEY = 'GANTI_DENGAN_ANON_KEY_KAMU';

  const { createClient } = supabase;
  const sb = createClient(https://tpptxnedrutcvxzdfdss.supabase.co, eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwcHR4bmVkcnV0Y3Z4emRmZHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODg2OTAsImV4cCI6MjA5MDk2NDY5MH0.-4wNK2BMvWluXTV8dE4hEtlh3jNQY2OhT2V9IBiiNds);

  let currentUser = null;
  let transactions = [];

  // Format rupiah
  const formatRp = (n) => 'Rp ' + Number(n).toLocaleString('id-ID');

  // Format tanggal
  const formatDate = (d) => new Date(d).toLocaleDateString('id-ID', {
    day: 'numeric', month: 'short', year: 'numeric'
  });

  // Init
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = '/login.html';
      return;
    }
    currentUser = session.user;
    document.getElementById('userEmail').textContent = currentUser.email;

    // Set tanggal default hari ini
    document.getElementById('txDate').value = new Date().toISOString().split('T')[0];

    await loadTransactions();
  }

  // Load transaksi
  async function loadTransactions() {
    const { data, error } = await sb
      .from('transactions')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('transaction_date', { ascending: false });

    if (error) { console.error(error); return; }
    transactions = data || [];
    renderTable();
    updateStats();
  }

  // Render tabel
  function renderTable() {
    const tbody = document.getElementById('txTable');
    if (transactions.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">Belum ada transaksi. Klik "+ Tambah Transaksi" untuk mulai.</td></tr>';
      return;
    }
    tbody.innerHTML = transactions.map(tx => `
      <tr>
        <td>${formatDate(tx.transaction_date)}</td>
        <td>${tx.description || '-'}</td>
        <td>${tx.category || '-'}</td>
        <td><span class="badge ${tx.type === 'income' ? 'badge-income' : 'badge-expense'}">
          ${tx.type === 'income' ? 'Pemasukan' : 'Pengeluaran'}
        </span></td>
        <td style="color: ${tx.type === 'income' ? '#2ecc8a' : '#ef4444'}; font-weight: 500;">
          ${tx.type === 'income' ? '+' : '-'}${formatRp(tx.amount)}
        </td>
        <td>
          <div class="action-btns">
            <button class="btn-edit" onclick="editTransaction('${tx.id}')">Edit</button>
            <button class="btn-delete" onclick="deleteTransaction('${tx.id}')">Hapus</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // Update statistik
  function updateStats() {
    const now = new Date();
    const thisMonth = transactions.filter(tx => {
      const d = new Date(tx.transaction_date);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
    const income = thisMonth.filter(t => t.type === 'income').reduce((a, t) => a + t.amount, 0);
    const expense = thisMonth.filter(t => t.type === 'expense').reduce((a, t) => a + t.amount, 0);
    const saldo = income - expense;

    document.getElementById('statIncome').textContent = formatRp(income);
    document.getElementById('statExpense').textContent = formatRp(expense);
    document.getElementById('statSaldo').textContent = formatRp(saldo);
  }

  // Buka modal tambah
  function openModal() {
    document.getElementById('modalTitle').textContent = 'Tambah Transaksi';
    document.getElementById('editId').value = '';
    document.getElementById('txType').value = 'expense';
    document.getElementById('txAmount').value = '';
    document.getElementById('txCategory').value = 'Makanan';
    document.getElementById('txDesc').value = '';
    document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('modalOverlay').classList.add('active');
  }

  // Buka modal edit
  function editTransaction(id) {
    const tx = transactions.find(t => t.id === id);
    if (!tx) return;
    document.getElementById('modalTitle').textContent = 'Edit Transaksi';
    document.getElementById('editId').value = tx.id;
    document.getElementById('txType').value = tx.type;
    document.getElementById('txAmount').value = tx.amount;
    document.getElementById('txCategory').value = tx.category || 'Lainnya';
    document.getElementById('txDesc').value = tx.description || '';
    document.getElementById('txDate').value = tx.transaction_date;
    document.getElementById('modalOverlay').classList.add('active');
  }

  // Tutup modal
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  // Simpan transaksi (tambah atau edit)
  async function saveTransaction() {
    const editId = document.getElementById('editId').value;
    const type = document.getElementById('txType').value;
    const amount = parseInt(document.getElementById('txAmount').value);
    const category = document.getElementById('txCategory').value;
    const description = document.getElementById('txDesc').value;
    const transaction_date = document.getElementById('txDate').value;

    if (!amount || amount <= 0) { alert('Nominal harus diisi!'); return; }
    if (!transaction_date) { alert('Tanggal harus diisi!'); return; }

    if (editId) {
      // UPDATE
      const { error } = await sb.from('transactions').update({
        type, amount, category, description, transaction_date
      }).eq('id', editId).eq('user_id', currentUser.id);
      if (error) { alert('Gagal update: ' + error.message); return; }
    } else {
      // INSERT
      const { error } = await sb.from('transactions').insert({
        user_id: currentUser.id,
        type, amount, category, description, transaction_date,
        source: 'dashboard'
      });
      if (error) { alert('Gagal simpan: ' + error.message); return; }
    }

    closeModal();
    await loadTransactions();
  }

  // Hapus transaksi
  async function deleteTransaction(id) {
    if (!confirm('Yakin hapus transaksi ini?')) return;
    const { error } = await sb.from('transactions')
      .delete()
      .eq('id', id)
      .eq('user_id', currentUser.id);
    if (error) { alert('Gagal hapus: ' + error.message); return; }
    await loadTransactions();
  }

  // Logout
  async function logout() {
    await sb.auth.signOut();
    window.location.href = '/login.html';
  }

  // Tutup modal kalau klik di luar
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  init();
</script>
</body>
</html>
